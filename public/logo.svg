<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Icon: interlocking H + droplet -->
  <g transform="translate(0, 4)">
    <!-- H left stem -->
    <rect x="2" y="0" width="5.5" height="32" rx="2.75" fill="url(#g)"/>
    <!-- H crossbar (angled down like water flow) -->
    <path d="M3 16L19 10" stroke="url(#g)" stroke-width="5.5" stroke-linecap="round"/>
    <!-- H right stem -->
    <rect x="16" y="0" width="5.5" height="32" rx="2.75" fill="url(#g)"/>
    <!-- Droplet dot on crossbar -->
    <circle cx="19" cy="10" r="3.5" fill="url(#g)"/>
    <circle cx="19" cy="10" r="1.5" fill="#fafafa"/>
  </g>
  <!-- Wordmark -->
  <text x="36" y="26" font-family="Sora, Inter, sans-serif" font-weight="700" font-size="18" fill="#fafafa" letter-spacing="-0.3">
    hydro<tspan fill="url(#g)">gel</tspan>
  </text>
  <!-- Tagline -->
  <text x="38" y="36" font-family="Sora, Inter, sans-serif" font-weight="600" font-size="6.5" fill="#a1a1aa" letter-spacing="2.5">
    MAROC
  </text>
</svg>
